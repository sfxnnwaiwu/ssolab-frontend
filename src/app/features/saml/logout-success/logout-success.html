<div
    class="flex min-h-screen items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 p-4"
>
    <div class="w-full max-w-md rounded-lg bg-white p-8 text-center shadow-2xl">
        <!-- Success Icon -->
        <div class="mb-6">
            <div
                class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-green-100"
            >
                <svg
                    class="h-8 w-8 text-green-600"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M5 13l4 4L19 7"
                    ></path>
                </svg>
            </div>
        </div>

        <!-- Title -->
        <h1 class="mb-2 text-3xl font-bold text-gray-900">Logout Successful</h1>

        <!-- Description -->
        <p class="mb-8 text-gray-600">
            You have been successfully logged out from both the test application and your SAML
            identity provider.
        </p>

        <!-- Status Message -->
        <div class="mb-8 rounded-lg border border-blue-200 bg-blue-50 p-4">
            <p class="text-sm text-blue-800">
                <strong>Status:</strong> SAML SLO (Single Logout) completed successfully
            </p>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col gap-3">
            <button
                (click)="navigateToDashboard()"
                class="w-full rounded-lg bg-indigo-600 px-4 py-3 font-semibold text-white transition-colors duration-200 hover:bg-indigo-700"
            >
                Back to Dashboard
            </button>
            <button
                (click)="navigateToLogin()"
                class="w-full rounded-lg bg-gray-200 px-4 py-3 font-semibold text-gray-800 transition-colors duration-200 hover:bg-gray-300"
            >
                Return to Login
            </button>
        </div>

        <!-- Footer -->
        <p class="mt-8 text-xs text-gray-500">
            You can now close this window or log in again with a different account.
        </p>
    </div>
</div>
